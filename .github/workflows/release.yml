name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: FileBroadcaster
            asset_name: FileBroadcaster-linux-x86_64
          - os: macos-latest
            artifact_name: FileBroadcaster
            asset_name: FileBroadcaster-macos-arm64
          - os: windows-latest
            artifact_name: FileBroadcaster.exe
            asset_name: FileBroadcaster-windows-x86_64.exe

    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja

      - name: Configure
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cmake -S . -B build -G Ninja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DBUILD_TESTING=OFF \
                  -DFILEBROADCASTER_VERSION="${VERSION}" \
                  -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"
          else
            cmake -S . -B build \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DBUILD_TESTING=OFF \
                  -DFILEBROADCASTER_VERSION="${VERSION}"
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifact
        run: |
          mkdir -p out
          cp build/${{ matrix.artifact_name }} out/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: out/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
